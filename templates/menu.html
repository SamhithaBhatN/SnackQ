{% extends "base.html" %}
{% block content %}

<section class="menu-section">

    <h2 class="menu-title">Our Menu</h2>
    <input type="text" id="searchInput" placeholder="Search food..." class="search-input">
    <!-- Category Filters -->
    <div class="menu-filters">
        <button class="filter-btn active" onclick="filterMenu('all', event)">All</button>
        <button class="filter-btn" onclick="filterMenu('Drinks', event)">Drinks</button>
        <button class="filter-btn" onclick="filterMenu('Breakfast', event)">Breakfast</button>
        <button class="filter-btn" onclick="filterMenu('Lunch', event)">Lunch</button>
        <button class="filter-btn" onclick="filterMenu('Snacks', event)">Snacks</button>
    </div>

    <!-- Menu Items Grid -->
    <div class="menu-grid">
    {% for item in menu_items %}
        <div class="menu-card" data-category="{{ item.category }}">
            <img src="{{ url_for('static', filename='images/' + (item.image or 'default.jpg')) }}" alt="{{ item.name }}">
            <h3>{{ item.name }}</h3>
            <p class="price">₹{{ item.price }}</p>
            {% if session.get("role") == "customer" %}
                {% if item.available == 1 %}
                    <button class="add-cart-btn"
                        onclick='addToCart({{ item.name|tojson }}, {{ item.price }}, {{ (item.image or "default.jpg")|tojson }})'>
                        Add to Cart
                    </button>
                {% else %}
                    <button class="add-cart-btn" disabled>
                        Out of Stock
                    </button>
                {% endif %}
            {% elif not session.get("user_id") %}
                    <button class="add-cart-btn" onclick="alert('Please login first')">
                        Add to Cart
                    </button>
            {% endif %}
        </div>
        {% endfor %}
    </div>
</section>

<script>

const currentUserId = {{ session.get("user_id")|tojson }};

const cartKey = currentUserId
    ? `cart_${currentUserId}`
    : "cart_guest";


// =========================
// CATEGORY FILTER
// =========================

function filterMenu(category, event) {

    const cards = document.querySelectorAll(".menu-card");

    const buttons = document.querySelectorAll(".filter-btn");

    buttons.forEach(btn => btn.classList.remove("active"));

    if (event) {
        event.target.classList.add("active");
    }

    cards.forEach(card => {

        if (
            category === "all" ||
            card.dataset.category === category
        ) {
            card.style.display = "block";
        } else {
            card.style.display = "none";
        }

    });

}


// =========================
// SEARCH
// =========================

document.addEventListener("DOMContentLoaded", function () {

    const searchInput = document.getElementById("searchInput");

    if (!searchInput) return;

    searchInput.addEventListener("input", function () {

        const value = this.value.toLowerCase();

        document.querySelectorAll(".filter-btn")
            .forEach(btn => btn.classList.remove("active"));

        document.querySelector(".filter-btn")
            .classList.add("active");

        document.querySelectorAll(".menu-card")
            .forEach(card => {

                const name = card.querySelector("h3")
                    .innerText
                    .toLowerCase();

                const category = card.dataset.category
                    .toLowerCase();

                if (
                    name.includes(value) ||
                    category.includes(value)
                ) {

                    card.style.display = "block";

                } else {

                    card.style.display = "none";

                }

            });

    });

    updateCartBadge();

});


// =========================
// ADD TO CART
// =========================

function addToCart(name, price, image) {

    let cart = JSON.parse(localStorage.getItem(cartKey)) || [];

    const existingItem = cart.find(item => item.name === name);

    if (existingItem) {

        existingItem.quantity++;

    } else {

        cart.push({

            name: name,
            price: price,
            image: image,
            quantity: 1

        });

    }

    localStorage.setItem(cartKey, JSON.stringify(cart));

    updateCartBadge();

    alert(name + " added to cart!");

}

</script>

{% endblock %}
