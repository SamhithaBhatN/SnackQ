{% extends "base.html" %}
{% block content %}

<section class="dashboard-section">

    <h2 class="dashboard-title">
        Edit Menu Item
    </h2>

    <div class="admin-section">

        <form
            method="POST"
            action="{{ url_for('update_menu', id=item.id) }}"
            enctype="multipart/form-data"
            class="staff-menu-form">

            <!-- Item Name -->
            <input
                type="text"
                name="name"
                value="{{ item.name }}"
                placeholder="Item Name"
                required>

            <!-- Price -->
            <input
                type="number"
                name="price"
                value="{{ item.price }}"
                placeholder="Price"
                min="1"
                step="0.01"
                required>

            <!-- Category -->
            <select
                name="category"
                required>

                <option value="Breakfast"
                    {% if item.category=="Breakfast" %}selected{% endif %}>
                    Breakfast
                </option>

                <option value="Lunch"
                    {% if item.category=="Lunch" %}selected{% endif %}>
                    Lunch
                </option>

                <option value="Snacks"
                    {% if item.category=="Snacks" %}selected{% endif %}>
                    Snacks
                </option>

                <option value="Drinks"
                    {% if item.category=="Drinks" %}selected{% endif %}>
                    Drinks
                </option>

            </select>

            <!-- Current Image -->
            <div style="width:100%; text-align:center; margin:10px 0;">

                <p><strong>Current Image</strong></p>

                <img
                    src="{{ url_for('static', filename='images/' + (item.image if item.image else 'default.jpg')) }}"
                    alt="{{ item.name }}"
                    style="width:160px; height:120px; object-fit:cover; border-radius:10px;">

            </div>

            <!-- Upload New Image -->
            <input
                type="file"
                name="image"
                accept="image/*">

            <small style="color:gray;">
                Leave empty to keep the current image.
            </small>

            <button
                type="submit"
                class="auth-btn">

                Update Menu Item

            </button>

        </form>

    </div>

</section>

{% endblock %}
