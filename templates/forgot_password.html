{% extends "base.html" %}
{% block content %}

<section class="auth-section">
    <div class="auth-container">

        <h2>Reset Password</h2>

        <form method="POST">

            <div class="input-group">
                <input type="text" name="username" required>
                <label>username</label>
            </div>

            <div class="input-group password-group">
                <input type="password" name="new_password" id="forgot_password" required>
                <label>New Password</label>
                <span class="toggle-password" onclick="togglePassword('forgot_password', this)">👁</span>
            </div>

            <div class="input-group password-group">
                <input type="password" id="confirm_password" required>
                <label>Confirm Password</label>
                <span class="toggle-password" onclick="togglePassword('confirm_password', this)">👁</span>
            </div>

            <button type="submit" class="auth-btn">Reset Password</button>

            <p class="auth-switch">
                Back to <a href="/login">Login</a>
            </p>

        </form>

    </div>
</section>

{% endblock %}
